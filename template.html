<!--
  Static Site Template
  
  This file serves as the base layout for all generated HTML pages.
  The Static Site Generator replaces the following placeholders:
  
  {{ Title }}   - Replaced with the h1 header of the markdown file.
  {{ Content }} - Replaced with the HTML conversion of the markdown body.
-->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ Title }}</title>
    <link href="/index.css" rel="stylesheet" />
  </head>

  <body>
    <article>{{ Content }}</article>
  </body>
</html>
